<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page introuvable — FinanceClé</title>
  <meta name="robots" content="noindex, follow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple: #6366f1;
      --cyan: #06b6d4;
      --orange: #f59e0b;
      --green: #10b981;
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface2: #22223a;
      --border: rgba(255,255,255,0.08);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 1.2rem;
      color: #fff;
      text-decoration: none;
      margin-bottom: 48px;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--purple), var(--cyan));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; font-weight: 800;
    }

    .error-code {
      font-size: clamp(5rem, 15vw, 9rem);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, var(--purple), var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
      letter-spacing: -0.04em;
    }

    h1 {
      font-size: clamp(1.3rem, 3vw, 1.8rem);
      font-weight: 700;
      color: #fff;
      margin-bottom: 12px;
    }

    .error-desc {
      font-size: 1rem;
      color: var(--muted);
      max-width: 420px;
      line-height: 1.65;
      margin-bottom: 36px;
    }

    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 28px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--purple), var(--purple-dark, #4f46e5));
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      text-decoration: none;
      transition: all var(--transition);
      box-shadow: 0 4px 20px rgba(99,102,241,0.3);
      margin-bottom: 16px;
    }
    .btn-home:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(99,102,241,0.42); }

    .nav-links {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .nav-links a {
      font-size: 0.85rem;
      color: var(--muted);
      text-decoration: none;
      padding: 6px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      transition: all var(--transition);
    }
    .nav-links a:hover { color: #fff; background: var(--surface); }

    .deco {
      position: fixed;
      width: 500px; height: 500px;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0.4;
    }
    .deco-1 {
      background: radial-gradient(circle, rgba(99,102,241,0.12) 0%, transparent 65%);
      top: -100px; left: -100px;
    }
    .deco-2 {
      background: radial-gradient(circle, rgba(6,182,212,0.08) 0%, transparent 65%);
      bottom: -100px; right: -100px;
    }
  </style>
</head>
<body>

  <div class="deco deco-1"></div>
  <div class="deco deco-2"></div>

  <a href="index.html" class="logo">
    <div class="logo-icon">₣</div>
    <span>FinanceClé</span>
  </a>

  <div class="error-code">404</div>
  <h1>Page introuvable</h1>
  <p class="error-desc">
    La page que vous recherchez n'existe pas ou a été déplacée.<br>
    Revenez à l'accueil pour continuer votre parcours financier.
  </p>

  <a href="index.html" class="btn-home">← Retour à l'accueil</a>

  <div class="nav-links">
    <a href="tableau-de-bord-macro.html">📊 Macro</a>
    <a href="selection-actions.html">📈 Actions</a>
    <a href="partenaires.html">🤝 Partenaires</a>
  </div>

</body>
</html>
